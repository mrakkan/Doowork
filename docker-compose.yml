services:
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      user-service:
        condition: service_started
      project-service:
        condition: service_started
      task-service:
        condition: service_started
      notification-service:
        condition: service_started
      gateway-service:
        condition: service_started

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  project-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: project_db
    ports:
      - "5433:5432"
    volumes:
      - project_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d project_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  task-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: task_db
    ports:
      - "5434:5432"
    volumes:
      - task_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d task_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notification_db
    ports:
      - "5435:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5



  user-service:
    build: 
      context: ./user-service
    expose:
      - "8081"
    environment:
      - DATABASE_URL=host=user-db user=admin password=password dbname=user_db port=5432 sslmode=disable
      - JWT_SECRET=your-secret-key-change-in-production
      - PORT=8081
    depends_on:
      user-db:
        condition: service_healthy

  project-service:
    build: 
      context: ./project-service
    expose:
      - "8082"
    environment:
      - DATABASE_URL=host=project-db user=admin password=password dbname=project_db port=5432 sslmode=disable
      - JWT_SECRET=your-secret-key-change-in-production
      - USER_SERVICE_URL=http://user-service:8081
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - PORT=8082
    depends_on:
      project-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  task-service:
    build: 
      context: ./task-service
    expose:
      - "8083"
    environment:
      - DATABASE_URL=host=task-db user=admin password=password dbname=task_db port=5432 sslmode=disable
      - JWT_SECRET=your-secret-key-change-in-production
      - USER_SERVICE_URL=http://user-service:8081
      - PROJECT_SERVICE_URL=http://project-service:8082
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - PORT=8083
    depends_on:
      task-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Notification Service (Port 8084)
  notification-service:
    build: 
      context: ./notification-service
    expose:
      - "8084"
    environment:
      - DATABASE_URL=host=notification-db user=admin password=password dbname=notification_db port=5432 sslmode=disable
      - JWT_SECRET=your-secret-key-change-in-production
      - USER_SERVICE_URL=http://user-service:8081
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - PORT=8084
      - TZ=Asia/Bangkok
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway-service:
    build:
      context: ./gateway-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - USER_SERVICE_URL=http://user-service:8081
      - PROJECT_SERVICE_URL=http://project-service:8082
      - TASK_SERVICE_URL=http://task-service:8083
      - NOTIFICATION_SERVICE_URL=http://notification-service:8084
    depends_on:
      user-service:
        condition: service_started
      project-service:
        condition: service_started
      task-service:
        condition: service_started
      notification-service:
        condition: service_started

volumes:
  user_db_data:
  project_db_data:
  task_db_data:
  notification_db_data: